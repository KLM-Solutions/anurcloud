.ivc1 .iv-logo-empty{opacity:.7;font-weight:600;}

.ivc1 .iv-name{font-family:var(--iv-font-h);font-weight:800;font-size:1.45em;line-height:1.1;margin:0;}
.ivc1 .iv-desig{font-size:.82em;font-weight:500;opacity:.92;margin-top:.25em;}
.ivc1 .iv-sub{font-size:.72em;opacity:.8;margin-top:.15em;}

/* avatar */
.ivc1 .iv-av{width:4.6em;height:4.6em;border-radius:1em;overflow:hidden;flex:none;border:3px solid rgba(255,255,255,.85);background:rgba(255,255,255,.15);

.ivc1 .iv-av img{width:100%;height:100%;object-fit:cover;display:block;}
.ivc1 .iv-av-fallback span{font-family:var(--iv-font-h);font-weight:800;font-size:1.4em;color:var(--iv-onp);}

/* wave divider */
.ivc1 .iv-wave{display:block;width:100%;height:1.1em;margin-top:1em;margin-bottom:-1px;position:relative;z-index:1;}

/* body */
.ivc1 .iv-body{background:var(--iv-bg);padding:1.05em 1.15em 1.2em;display:flex;flex-direction:column;gap:.85em;}
.ivc1 .iv-bio{font-size:.8em;color:var(--iv-muted);line-height:1.55;margin:0;}

/* contact */
.ivc1 .iv-contact{background:var(--iv-surface);border:1px solid rgba(15,23,42,.07);border-radius:.85em;padding:.85em .95em;box-shadow:0 1px 2px rgba(15,23,42,.04);}
.ivc1 .iv-ctitle{font-family:var(--iv-font-h);font-weight:700;font-size:.7em;text-transform:uppercase;letter-spacing:.6px;color:var(--iv-muted);margin-bottom:.6em;}
.ivc1 .iv-crow{display:flex;justify-content:space-between;gap:.6em;padding:.28em 0;border-top:1px dashed rgba(15,23,42,.08);}
.ivc1 .iv-crow:first-of-type{border-top:0;}
.ivc1 .iv-clabel{font-size:.74em;color:var(--iv-muted);font-weight:500;}
.ivc1 .iv-cval{font-size:.76em;font-weight:600;text-align:right;word-break:break-word;}

/* chips */
.ivc1 .iv-chips{display:flex;flex-wrap:wrap;gap:.35em;}
.ivc1 .iv-chip{font-size:.68em;font-weight:600;color:var(--iv-primary-dark);background:color-mix(in srgb,var(--iv-primary) 12%,#fff);
  border:1px solid color-mix(in srgb,var(--iv-primary) 22%,#fff);padding:.28em .6em;border-radius:999px;}

/* social */

.ivc1 .iv-scount{display:flex;flex-direction:column;}
.ivc1 .iv-scount b{font-family:var(--iv-font-h);font-size:1em;font-weight:800;line-height:1;}
.ivc1 .iv-scount span{font-size:.66em;color:var(--iv-muted);}
.ivc1 .iv-si{display:flex;align-items:center;justify-content:center;width:2em;height:2em;border-radius:.55em;color:#fff;font-size:.68em;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.ivc1 .iv-sirow{display:flex;gap:.4em;}

/* CTA buttons */
.ivc1 .iv-cta{display:flex;gap:.5em;}
.ivc1 .iv-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:.35em;font-size:.76em;font-weight:700;color:#fff;
  padding:.65em .5em;border-radius:.7em;box-shadow:0 3px 8px rgba(0,0,0,.12);}
.ivc1 .iv-btn-accent{background:var(--iv-accent);}
.ivc1 .iv-btn-wa{background:#22C55E;}

.ivc1 .iv-item-h{font-family:var(--iv-font-h);font-weight:700;font-size:.82em;}
.ivc1 .iv-item-sub{font-size:.72em;color:var(--iv-primary-dark);font-weight:600;}

.ivc1 .iv-ed-meta{margin-top:.15em;}
